<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMISSION</title>
    <style>

        body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: lightgreen;
}
header {
            background: #0b6623;
            color: white;
            padding: 15px;
            text-align:center;
        }
.section h2 {
    color: #0b6623;
    margin-bottom: 20px;
}

.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
/* FORM */
.form-container {
    max-width: 600px;
    margin: auto;
    background:lightgreen;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

form input, form select, form textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

form button {
    background: #0b6623;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
}
</style>
</head>
<body>
    <header>
     <h1>Online Admission Form</h1>
     </header>
    <div class="form-container">
        <form onsubmit="submitForm(event)">
            <input type="text" placeholder="Full Name" required>
            <input type="date" required>
            <select required>
                <option value="">Select Class</option>
                <option>JSS1</option>
                <option>JSS2</option>
                <option>JSS3</option>
                <option>SSS1</option>
                <option>SSS2</option>
                <option>SSS3</option>
            </select>
            <input type="text" placeholder="Parent/Guardian Name" required>
            <input type="tel" placeholder="Phone Number" required>
            <textarea placeholder="Address"></textarea>
            <button type="submit">Submit Application</button>
        </form>
    </div>
    
</body>
</html>
